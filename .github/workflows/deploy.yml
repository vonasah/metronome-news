# Deploy Astro site to GitHub Pages
name: Deploy to GitHub Pages

on:
  # Запускается при каждом push в main
  push:
    branches: [main]

  # Позволяет запускать вручную из вкладки Actions
  workflow_dispatch:

# GitHub Pages нуждается в правильных правах
permissions:
  contents: read
  pages: write
  id-token: write

# Одна сборка одновременно — новая отменяет старую
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Astro site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4